<!doctype html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
       <title>The product data</title>
    </head>
    <body>
        <main>
            <h1>The product data</h1>              
                {% if error %}
                    <p>{{ error }}</p>
            
                {% elif not products %}
                    <p>No products found</p>

                {% else %}
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Price</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for product in products %}
                        <tr>
                            <td>{{ product.name }}</td>
                            <td>{{ product.category }}</td>
                            <td>{{ product.price }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
                {% endif %}
            </main>
    </body>
    </html>
